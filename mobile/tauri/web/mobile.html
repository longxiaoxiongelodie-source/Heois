<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>MiniStar</title>
  <meta name="theme-color" content="#101528" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MiniStar" />
  <link rel="apple-touch-icon" href="ministar-icon.png" />
  <link rel="stylesheet" href="mobile.css" />
</head>
<body>
  <div id="mobile-app">
    <aside id="mobile-picker" class="hidden">
      <div class="mobile-picker-head">
        <div class="mobile-search-shell">
          <input id="mobile-search-input" type="search" placeholder="搜索会话 / 文件夹" />
        </div>
        <button id="mobile-new-chat-top-btn" class="mobile-icon-btn" title="新建对话">＋</button>
        <button id="mobile-history-btn" class="mobile-icon-btn" title="历史记录"><span class="mobile-history-glyph" aria-hidden="true">◷</span></button>
      </div>

      <div id="mobile-timeline-strip">
        <button id="mobile-timeline-toggle-btn" class="mobile-timeline-btn active" title="切换到旧时光">≈</button>
        <button id="mobile-new-folder-btn" class="mobile-timeline-btn mobile-timeline-icon-btn" title="新建文件夹">☁</button>
      </div>

      <div id="mobile-picker-list"></div>

      <div class="mobile-picker-foot">
        <button id="mobile-user-btn" class="mobile-foot-btn">
          <span id="mobile-user-avatar" class="mobile-avatar-dot">ꕥ</span>
          <span id="mobile-user-label">用户</span>
        </button>
        <button id="mobile-settings-btn" class="mobile-foot-btn mobile-foot-icon-btn" title="设置">⚙</button>
      </div>
    </aside>

    <div id="mobile-picker-backdrop" class="hidden"></div>

    <main id="mobile-chat-shell">
      <header id="mobile-chat-header">
        <div class="mobile-chat-header-left">
          <button id="mobile-picker-toggle" class="mobile-icon-btn" title="打开选择界面">☰</button>
        </div>
        <div class="mobile-chat-header-center">
          <div id="mobile-conv-title">新对话</div>
          <button id="mobile-model-trigger" class="mobile-model-trigger" title="选择模型">
            <span id="mobile-model-name">未选择模型</span>
          </button>
        </div>
        <div class="mobile-chat-header-right">
          <button id="mobile-map-trigger" class="mobile-icon-btn" title="迷你地图">⌘</button>
        </div>
      </header>

      <section id="mobile-messages"></section>

      <button id="mobile-scroll-bottom-btn" class="hidden" title="回到底部">↓</button>

      <footer id="mobile-input-dock">
        <div id="mobile-extra-menu" class="hidden">
          <button id="mobile-clear-context-btn" class="mobile-extra-item">清空上下文</button>
          <button id="mobile-new-chat-inline-btn" class="mobile-extra-item">新对话</button>
        </div>
        <div id="mobile-input-bar">
          <button id="mobile-extra-btn" class="mobile-pill-icon" title="更多">+</button>
          <textarea id="mobile-user-input" rows="2" placeholder="输入消息，Ctrl+Enter 发送…"></textarea>
          <button id="mobile-send-btn" class="mobile-pill-send">发送</button>
        </div>
      </footer>
    </main>
  </div>

  <div id="mobile-model-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3>选择模型</h3>
        <button id="mobile-model-sheet-close" class="mobile-icon-btn">✕</button>
      </div>
      <div id="mobile-model-list" class="mobile-sheet-body"></div>
    </div>
  </div>

  <div id="mobile-history-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3>历史记录</h3>
        <button id="mobile-history-sheet-close" class="mobile-icon-btn">✕</button>
      </div>
      <div id="mobile-history-list" class="mobile-sheet-body"></div>
    </div>
  </div>

  <div id="mobile-map-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3>迷你地图</h3>
        <button id="mobile-map-sheet-close" class="mobile-icon-btn">✕</button>
      </div>
      <div id="mobile-map-list" class="mobile-sheet-body"></div>
    </div>
  </div>

  <div id="mobile-settings-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3>轻设置</h3>
        <button id="mobile-settings-sheet-close" class="mobile-icon-btn">✕</button>
      </div>
      <div id="mobile-settings-body" class="mobile-sheet-body">
        <button id="mobile-settings-timeline-toggle" class="mobile-model-item">
          <div class="mobile-model-title">时间层</div>
          <div id="mobile-settings-timeline-sub" class="mobile-model-sub">现在</div>
        </button>
        <div class="mobile-model-item mobile-settings-static">
          <div class="mobile-model-title">当前模型</div>
          <div id="mobile-settings-model-sub" class="mobile-model-sub">未选择模型</div>
        </div>
        <button id="mobile-settings-app-icon-trigger" class="mobile-model-item">
          <div class="mobile-model-title">App 图标</div>
          <div id="mobile-settings-app-icon-sub" class="mobile-model-sub">现行</div>
        </button>
        <button id="mobile-settings-backend-trigger" class="mobile-model-item">
          <div class="mobile-model-title">后端地址</div>
          <div id="mobile-settings-backend-sub" class="mobile-model-sub"></div>
        </button>
        <div class="mobile-model-item mobile-settings-static">
          <div class="mobile-model-title">连接状态</div>
          <div id="mobile-settings-health-sub" class="mobile-model-sub">检查中…</div>
        </div>
        <button id="mobile-settings-clear-cache-btn" class="mobile-model-item mobile-settings-danger">
          <div class="mobile-model-title">清手机端缓存</div>
          <div class="mobile-model-sub">只清本机收藏、折叠与临时状态，不删除后端对话数据</div>
        </button>
      </div>
    </div>
  </div>

  <div id="mobile-conv-actions-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3 id="mobile-conv-actions-title">会话操作</h3>
        <button id="mobile-conv-actions-close" class="mobile-icon-btn">✕</button>
      </div>
      <div id="mobile-conv-actions-list" class="mobile-sheet-body">
        <button id="mobile-conv-rename-btn" class="mobile-action-row">重命名</button>
        <button id="mobile-conv-pin-btn" class="mobile-action-row">置顶</button>
        <button id="mobile-conv-retitle-btn" class="mobile-action-row">重新生成标题</button>
        <button id="mobile-conv-move-btn" class="mobile-action-row">移动到</button>
        <button id="mobile-conv-delete-btn" class="mobile-action-row danger">删除</button>
      </div>
    </div>
  </div>

  <div id="mobile-move-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3>移动到</h3>
        <button id="mobile-move-sheet-close" class="mobile-icon-btn">✕</button>
      </div>
      <div id="mobile-move-list" class="mobile-sheet-body"></div>
    </div>
  </div>

  <div id="mobile-message-more-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3 id="mobile-message-more-title">消息操作</h3>
        <button id="mobile-message-more-close" class="mobile-icon-btn">✕</button>
      </div>
      <div class="mobile-sheet-body">
        <button id="mobile-message-more-copy-btn" class="mobile-action-row">复制</button>
        <button id="mobile-message-more-memory-btn" class="mobile-action-row">写入长期记忆</button>
        <button id="mobile-message-more-edit-btn" class="mobile-action-row">编辑</button>
        <button id="mobile-message-more-regen-btn" class="mobile-action-row">重新生成</button>
        <button id="mobile-message-more-tts-btn" class="mobile-action-row">朗读</button>
        <button id="mobile-message-more-delete-btn" class="mobile-action-row danger">删除</button>
      </div>
    </div>
  </div>

  <div id="mobile-backend-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3>连接 StarT</h3>
        <button id="mobile-backend-sheet-close" class="mobile-icon-btn">✕</button>
      </div>
      <div class="mobile-sheet-body">
        <label class="mobile-backend-field">
          <span class="mobile-model-title">后端地址</span>
          <input id="mobile-backend-input" type="text" inputmode="url" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="例如 192.168.1.23:8000" />
        </label>
        <div class="mobile-model-sub">支持直接输入 `IP:端口`，也支持完整地址，如 `http://192.168.1.23:8000`。</div>
        <div id="mobile-backend-status" class="mobile-model-sub"></div>
        <div class="mobile-sheet-actions">
          <button id="mobile-backend-test-btn" class="mobile-sheet-primary">测试连接</button>
          <button id="mobile-backend-save-btn" class="mobile-sheet-primary">保存并连接</button>
          <button id="mobile-backend-reset-btn" class="mobile-sheet-secondary">恢复默认</button>
        </div>
      </div>
    </div>
  </div>

  <div id="mobile-app-icon-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3>App 图标</h3>
        <button id="mobile-app-icon-sheet-close" class="mobile-icon-btn">✕</button>
      </div>
      <div id="mobile-app-icon-list" class="mobile-sheet-body mobile-app-icon-list"></div>
    </div>
  </div>

  <div id="mobile-user-sheet" class="mobile-sheet hidden">
    <div class="mobile-sheet-backdrop"></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-grabber"></div>
      <div class="mobile-sheet-head">
        <h3>用户资料</h3>
        <button id="mobile-user-sheet-close" class="mobile-icon-btn">✕</button>
      </div>
      <div class="mobile-sheet-body">
        <div class="mobile-user-profile-preview">
          <span id="mobile-user-sheet-avatar" class="mobile-avatar-dot">ꕥ</span>
          <div class="mobile-user-profile-copy">
            <div class="mobile-model-title">当前显示</div>
            <div id="mobile-user-sheet-sub" class="mobile-model-sub">用户</div>
          </div>
        </div>
        <label class="mobile-backend-field">
          <span class="mobile-model-title">用户名</span>
          <input id="mobile-user-name-input" type="text" maxlength="24" placeholder="输入你的显示名字" />
        </label>
        <div class="mobile-sheet-actions">
          <button id="mobile-user-avatar-pick-btn" class="mobile-sheet-primary">选择头像</button>
          <button id="mobile-user-avatar-clear-btn" class="mobile-sheet-secondary">清空头像</button>
          <button id="mobile-user-save-btn" class="mobile-sheet-primary">保存</button>
        </div>
      </div>
    </div>
  </div>

  <input id="mobile-user-avatar-input" type="file" accept="image/*" hidden />

  <div id="mobile-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script type="module" src="mobile.js"></script>
</body>
</html>
