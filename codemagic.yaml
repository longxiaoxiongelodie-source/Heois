workflows:
  ministar_ios_build:
    name: MiniStar iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.kiwi4193.andromeda2796
      vars:
        BUNDLE_ID: "app.kiwi4193.andromeda2796"
        TAURI_APP_DIR: "$CM_BUILD_DIR/mobile/tauri"
        CERT_PASSWORD: "1"
      xcode: latest
      node: 22.22.2

    scripts:
      - name: Check and import certificates
        script: |
          set -euxo pipefail
          
          CERT_FILE=$(find /Users/builder -name "*.p12" -type f 2>/dev/null | head -n 1)
          if [ -z "$CERT_FILE" ]; then
            echo "ERROR: No .p12 certificate found"
            exit 1
          fi
          
          security import "$CERT_FILE" -k ~/Library/Keychains/login.keychain-db -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$CERT_PASSWORD" ~/Library/Keychains/login.keychain-db || true
          
          echo "=== Certificates ==="
          security find-identity -v -p codesigning
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          find /Users/builder -name "*.mobileprovision" -type f 2>/dev/null | while read f; do
            TARGET="$HOME/Library/MobileDevice/Provisioning Profiles/$(basename "$f")"
            [ ! -f "$TARGET" ] && cp "$f" "$TARGET"
          done

      - name: Install Rust
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install dependencies
        script: |
          cd "$TAURI_APP_DIR"
          npm ci || npm install

      - name: Build frontend
        script: |
          cd "$TAURI_APP_DIR"
          npm run build || echo "No build script"

      - name: Configure tauri.conf.json with correct Bundle ID
        script: |
          cd "$TAURI_APP_DIR"
          CONFIG="src-tauri/tauri.conf.json"
          
          cat > "$CONFIG" << 'JSONEOF'
{
  "build": {
    "beforeDevCommand": "npm run dev",
    "beforeBuildCommand": "npm run build",
    "devUrl": "http://localhost:1420",
    "frontendDist": "../dist"
  },
  "bundle": {
    "active": true,
    "identifier": "app.kiwi4193.andromeda2796",
    "icon": [
      "icons/32x32.png",
      "icons/128x128.png",
      "icons/128x128@2x.png",
      "icons/icon.icns",
      "icons/icon.ico"
    ],
    "iOS": {
      "developmentTeam": "3K3Y88J6DX",
      "bundleIdentifier": "app.kiwi4193.andromeda2796"
    }
  },
  "tauri": {
    "bundle": {},
    "allowlist": {},
    "windows": []
  }
}
JSONEOF
          echo "tauri.conf.json configured with correct Bundle ID"
          cat "$CONFIG" | head -20

      - name: Generate iOS project
        script: |
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          rm -rf src-tauri/gen/apple
          npx tauri ios init

      - name: Build IPA
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          
          PROJECT_PATH=$(find src-tauri/gen/apple -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          cd "$PROJECT_DIR"
          
          SCHEME_NAME=$(find . -name "*.xcscheme" | head -n 1 | sed 's/.*\///' | sed 's/\.xcscheme//')
          
          cp "$CM_BUILD_DIR/exportOptions.plist" ./ 2>/dev/null || true
          
          mkdir -p "$CM_BUILD_DIR/build"
          
          xcodebuild archive \
            -project "$(basename "$PROJECT_PATH")" \
            -scheme "$SCHEME_NAME" \
            -archivePath "$CM_BUILD_DIR/build/ministar.xcarchive" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="Apple Distribution: Smith T (3K3Y88J6DX)" \
            CODE_SIGN_STYLE="Manual" \
            PROVISIONING_PROFILE_SPECIFIER="f708b7ef-a0b5-4dd8-a233-3b7d78519e1f" \
            DEVELOPMENT_TEAM="3K3Y88J6DX"
          
          if [ -f "exportOptions.plist" ]; then
            xcodebuild -exportArchive \
              -archivePath "$CM_BUILD_DIR/build/ministar.xcarchive" \
              -exportPath "$CM_BUILD_DIR/build/ipa" \
              -exportOptionsPlist exportOptions.plist
          fi
          
          find "$CM_BUILD_DIR/build" -name "*.ipa" -print

    artifacts:
      - build/ipa/*.ipa
