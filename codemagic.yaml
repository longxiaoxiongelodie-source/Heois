workflows:
  ministar_ios_build:
    name: MiniStar iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.kiwi4193.andromeda2796
      vars:
        APP_NAME: "MiniStar"
        BUNDLE_ID: "app.kiwi4193.andromeda2796"
        DEVELOPMENT_TEAM: "3K3Y88J6DX"
        CERT_PASSWORD: "1"
        TAURI_APP_DIR: "$CM_BUILD_DIR/mobile/tauri"
        TAURI_SRC_DIR: "$CM_BUILD_DIR/mobile/tauri/src-tauri"
      xcode: latest
      node: 22.22.2

    cache:
      cache_paths:
        - $HOME/.cargo/registry
        - $HOME/.cargo/git
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/mobile/tauri/node_modules

    scripts:
      - name: Show build context
        script: |
          set -euxo pipefail
          uname -a
          sw_vers
          xcodebuild -version
          rustc --version || true
          cargo --version || true
          node --version
          npm --version

      - name: Check project files
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR"
          find . -maxdepth 4 -type f \( -name "package.json" -o -name "tauri.conf.json" -o -name "mobile.html" \) | sort
          test -f "$TAURI_APP_DIR/package.json"
          test -f "$TAURI_SRC_DIR/tauri.conf.json"
          test -f "$TAURI_APP_DIR/web/mobile.html"

      - name: Inspect signing assets
        script: |
          set -euxo pipefail
          echo "=== Certificates ==="
          security find-identity -v -p codesigning || true
          echo "=== Provisioning Profiles ==="
          find "$HOME/Library/MobileDevice/Provisioning Profiles" -maxdepth 1 -name "*.mobileprovision" -print || true

      - name: Install Rust and iOS targets
        script: |
          set -euxo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install frontend dependencies
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          npm install

      - name: Patch tauri identifier
        script: |
          set -euxo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          tauri_src = os.environ['TAURI_SRC_DIR']
          bundle_id = os.environ['BUNDLE_ID']
          path = Path(tauri_src) / 'tauri.conf.json'
          data = json.loads(path.read_text(encoding='utf-8'))
          data['identifier'] = bundle_id
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print('patched', path)
          PY

      - name: Generate Tauri iOS project
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          rm -rf src-tauri/gen/apple
          npx tauri ios init
          find src-tauri/gen/apple -maxdepth 2 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) -print

      - name: Inject alternate app icons
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          export ALT_ICON_SRC_DIR="$TAURI_SRC_DIR/icons/ios-alternate"
          export IOS_ASSETS_DIR="$(find "$TAURI_SRC_DIR/gen/apple" -maxdepth 2 -type d -name 'Assets.xcassets' | head -n 1)"
          export IOS_XCODEPROJ="$(find "$TAURI_SRC_DIR/gen/apple" -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          python3 - <<'PY'
          import os
          import json
          import shutil
          import subprocess
          from pathlib import Path

          alt_src = Path(os.environ['ALT_ICON_SRC_DIR'])
          assets_dir = Path(os.environ['IOS_ASSETS_DIR'])

          icon_map = {
              'Seal': {'folder': 'seal'},
              'Orbit': {'folder': 'orbit'},
              'Spark': {'folder': 'spark'},
          }

          icon_specs = [
              ('Icon-20@2x.png', 40, 'iphone', '20x20', '2x'),
              ('Icon-20@3x.png', 60, 'iphone', '20x20', '3x'),
              ('Icon-29@2x.png', 58, 'iphone', '29x29', '2x'),
              ('Icon-29@3x.png', 87, 'iphone', '29x29', '3x'),
              ('Icon-40@2x.png', 80, 'iphone', '40x40', '2x'),
              ('Icon-40@3x.png', 120, 'iphone', '40x40', '3x'),
              ('Icon-60@2x.png', 120, 'iphone', '60x60', '2x'),
              ('Icon-60@3x.png', 180, 'iphone', '60x60', '3x'),
              ('Icon-20.png', 20, 'ipad', '20x20', '1x'),
              ('Icon-20@2x-ipad.png', 40, 'ipad', '20x20', '2x'),
              ('Icon-29.png', 29, 'ipad', '29x29', '1x'),
              ('Icon-29@2x-ipad.png', 58, 'ipad', '29x29', '2x'),
              ('Icon-40.png', 40, 'ipad', '40x40', '1x'),
              ('Icon-40@2x-ipad.png', 80, 'ipad', '40x40', '2x'),
              ('Icon-76.png', 76, 'ipad', '76x76', '1x'),
              ('Icon-76@2x.png', 152, 'ipad', '76x76', '2x'),
              ('Icon-83.5@2x.png', 167, 'ipad', '83.5x83.5', '2x'),
          ]

          for icon_name, spec in icon_map.items():
              folder_key = spec['folder']
              iconset_dir = assets_dir / f"{icon_name}.appiconset"
              iconset_dir.mkdir(parents=True, exist_ok=True)
              images = []
              master = alt_src / folder_key / f"ministar-{folder_key}-180.png"
              if not master.exists():
                  raise FileNotFoundError(f"missing alternate icon master: {master}")
              for target_name, pixel_size, idiom, size, scale in icon_specs:
                  target = iconset_dir / target_name
                  subprocess.run(
                      ["sips", "-z", str(pixel_size), str(pixel_size), str(master), "--out", str(target)],
                      check=True,
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.DEVNULL,
                  )
                  images.append({
                      "filename": target_name,
                      "idiom": idiom,
                      "size": size,
                      "scale": scale,
                  })
              contents = {
                  "images": images,
                  "info": {"version": 1, "author": "xcode"},
              }
              (iconset_dir / "Contents.json").write_text(
                  json.dumps(contents, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )

          print("Injected alternate appiconsets into", assets_dir)
          PY
          ruby - <<'RUBY'
          require 'xcodeproj'

          project_path = ENV.fetch('IOS_XCODEPROJ')
          project = Xcodeproj::Project.open(project_path)
          alternate_names = 'Seal Orbit Spark'

          project.build_configurations.each do |config|
            config.build_settings['ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS'] = 'YES'
            config.build_settings['ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES'] = alternate_names
          end

          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS'] = 'YES'
              config.build_settings['ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES'] = alternate_names
            end
          end

          project.save
          puts "Configured alternate appiconsets in Xcode build settings: #{project_path}"
          RUBY

      - name: Locate manual signing assets
        script: |
          set -euxo pipefail
          CERT_FILE="$(find /Users/builder -name '*.p12' -type f 2>/dev/null | head -n 1)"
          PROFILE_FILE="$(find /Users/builder -name '*.mobileprovision' -type f 2>/dev/null | head -n 1)"
          if [ -z "$CERT_FILE" ]; then
            echo "No .p12 certificate found"
            exit 1
          fi
          if [ -z "$PROFILE_FILE" ]; then
            echo "No .mobileprovision profile found"
            exit 1
          fi
          printf 'CERT_FILE=%s\n' "$CERT_FILE" >> "$CM_ENV"
          printf 'PROFILE_FILE=%s\n' "$PROFILE_FILE" >> "$CM_ENV"
          echo "Using certificate: $CERT_FILE"
          echo "Using profile: $PROFILE_FILE"

      - name: Apply provisioning profile to generated project
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          PROJECT_PATH="$(find src-tauri/gen/apple -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          if [ -z "$PROJECT_PATH" ]; then
            echo "No Xcode project found under src-tauri/gen/apple"
            exit 1
          fi
          xcode-project use-profiles \
            --project "$PROJECT_PATH" \
            --profile "$PROFILE_FILE" \
            --archive-method ad-hoc \
            --custom-export-options='{"provisioningProfiles":{"app.kiwi4193.andromeda2796":"app.kiwi4193.andromeda2796"}}' \
            --export-options-plist "$CM_BUILD_DIR/exportOptions.plist"

      - name: Build signed IPA
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          export DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM"
          export APPLE_DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM"
          export RUST_BACKTRACE=1
          export IOS_CERTIFICATE="$(base64 -i "$CERT_FILE" | tr -d '\n')"
          export IOS_CERTIFICATE_PASSWORD="$CERT_PASSWORD"
          export IOS_MOBILE_PROVISION="$(base64 -i "$PROFILE_FILE" | tr -d '\n')"
          npx tauri ios build --export-method release-testing

      - name: List generated artifacts
        script: |
          set -euxo pipefail
          find "$TAURI_SRC_DIR/gen/apple/build" -maxdepth 5 \( -name "*.ipa" -o -name "*.app" -o -name "*.dSYM" -o -name "*.dSYM.zip" \) -print || true

    artifacts:
      - mobile/tauri/src-tauri/gen/apple/build/**/*.ipa
      - mobile/tauri/src-tauri/gen/apple/build/**/*.app
      - mobile/tauri/src-tauri/gen/apple/build/**/*.dSYM
      - mobile/tauri/src-tauri/gen/apple/build/**/*.dSYM.zip
