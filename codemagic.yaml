workflows:
  ministar_ios_build:
    name: MiniStar iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.kiwi4193.andromeda2796
      vars:
        APP_NAME: "MiniStar"
        BUNDLE_ID: "app.kiwi4193.andromeda2796"
        TAURI_APP_DIR: "$CM_BUILD_DIR/mobile/tauri"
        TAURI_SRC_DIR: "$CM_BUILD_DIR/mobile/tauri/src-tauri"
      xcode: latest
      node: 22.22.2

    cache:
      cache_paths:
        - $HOME/.cargo/registry
        - $HOME/.cargo/git
        - $HOME/.rustup
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/mobile/tauri/node_modules

    scripts:
      - name: Show build context
        script: |
          set -euxo pipefail
          uname -a
          sw_vers
          xcodebuild -version
          node --version
          npm --version
          echo "Checking directory structure..."
          ls -la "$CM_BUILD_DIR/mobile/tauri" || echo "Directory not found"

      - name: Install Rust
        script: |
          set -euxo pipefail
          if ! command -v rustc &> /dev/null; then
            echo "Rust not found, installing..."
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          else
            echo "Rust already installed"
          fi
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version
          rustup --version

      - name: Install Rust iOS targets
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install frontend dependencies
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la
          
          if [ ! -f "package.json" ]; then
            echo "ERROR: package.json not found in $(pwd)"
            exit 1
          fi
          
          if [ -f "package-lock.json" ]; then
            echo "Found package-lock.json, using npm ci"
            npm ci
          else
            echo "No package-lock.json found, using npm install"
            npm install
          fi

      - name: Generate Tauri iOS project
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          
          if [ ! -d src-tauri/gen/apple ]; then
            echo "Initializing Tauri iOS project..."
            npx tauri ios init
          else
            echo "Tauri iOS project already exists"
          fi
          
          echo "Found Xcode projects:"
          find src-tauri/gen/apple -maxdepth 2 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) -print

      - name: Apply provisioning profiles
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          
          PROJECT_PATH="$(find src-tauri/gen/apple -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          if [ -z "$PROJECT_PATH" ]; then
            echo "ERROR: No Xcode project found under src-tauri/gen/apple"
            exit 1
          fi
          
          echo "Using project: $PROJECT_PATH"
          keychain initialize
          xcode-project use-profiles --project "$PROJECT_PATH"

      - name: Build signed IPA
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          
          echo "Building iOS app with release-testing export method..."
          npx tauri ios build --export-method release-testing
          
          echo "Build completed, checking for IPA..."
          find src-tauri/gen/apple/build -name "*.ipa" -print || echo "No IPA found yet"

      - name: List generated artifacts
        script: |
          set -euxo pipefail
          echo "Searching for generated artifacts..."
          find "$TAURI_SRC_DIR/gen/apple/build" -maxdepth 4 \( -name "*.ipa" -o -name "*.app" -o -name "*.dSYM" -o -name "*.dSYM.zip" \) -print || true
          echo "Also checking DerivedData..."
          find "$HOME/Library/Developer/Xcode/DerivedData" -name "*.ipa" -print 2>/dev/null || true

    artifacts:
      - mobile/tauri/src-tauri/gen/apple/build/**/*.ipa
      - mobile/tauri/src-tauri/gen/apple/build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.ipa
