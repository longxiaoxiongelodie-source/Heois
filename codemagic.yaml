workflows:
  ministar_ios_build:
    name: MiniStar iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.kiwi4193.andromeda2796
      vars:
        APP_NAME: "MiniStar"
        BUNDLE_ID: "app.kiwi4193.andromeda2796"
        TAURI_APP_DIR: "$CM_BUILD_DIR/mobile/tauri"
        TAURI_SRC_DIR: "$CM_BUILD_DIR/mobile/tauri/src-tauri"
      xcode: latest
      node: 22.22.2

    cache:
      cache_paths:
        - $HOME/.cargo/registry
        - $HOME/.cargo/git
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/mobile/tauri/node_modules

    scripts:
      - name: Show build context
        script: |
          set -euxo pipefail
          uname -a
          sw_vers
          xcodebuild -version
          rustc --version || true
          cargo --version || true
          node --version
          npm --version

      - name: Install frontend dependencies
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          npm ci || npm install

      - name: Install Rust iOS targets
        script: |
          set -euxo pipefail
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Generate Tauri iOS project
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          if [ ! -d src-tauri/gen/apple ]; then
            npx tauri ios init
          fi
          find src-tauri/gen/apple -maxdepth 2 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) -print

      - name: Apply provisioning profiles
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          PROJECT_PATH="$(find src-tauri/gen/apple -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          if [ -z "$PROJECT_PATH" ]; then
            echo "No Xcode project found under src-tauri/gen/apple"
            exit 1
          fi
          keychain initialize
          # 使用你在环境变量中配置的证书和描述文件
          xcode-project use-profiles --project "$PROJECT_PATH"

      - name: Build signed IPA
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          # 使用 ad_hoc 方式导出，而不是 app-store-connect
          npx tauri ios build --export-method ad-hoc

      - name: List generated artifacts
        script: |
          set -euxo pipefail
          find "$TAURI_SRC_DIR/gen/apple/build" -maxdepth 4 \( -name "*.ipa" -o -name "*.app" -o -name "*.dSYM" -o -name "*.dSYM.zip" \) -print || true

    artifacts:
      - mobile/tauri/src-tauri/gen/apple/build/**/*.ipa
      - mobile/tauri/src-tauri/gen/apple/build/**/*.app
