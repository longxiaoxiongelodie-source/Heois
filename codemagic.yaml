workflows:
  ministar_ios_build:
    name: MiniStar iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.kiwi4193.andromeda2796
      vars:
        BUNDLE_ID: "app.kiwi4193.andromeda2796"
        TAURI_APP_DIR: "$CM_BUILD_DIR/mobile/tauri"
        CERT_PASSWORD: "1"
      xcode: latest
      node: 22.22.2

    scripts:
      - name: Check and import certificates
        script: |
          set -euxo pipefail
          
          echo "=== Searching for .p12 files ==="
          CERT_FILE=$(find /Users/builder -name "*.p12" -type f 2>/dev/null | head -n 1)
          
          if [ -z "$CERT_FILE" ]; then
            echo "ERROR: No .p12 certificate found"
            exit 1
          fi
          
          echo "=== Found certificate: $CERT_FILE ==="
          
          security import "$CERT_FILE" -k ~/Library/Keychains/login.keychain-db -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$CERT_PASSWORD" ~/Library/Keychains/login.keychain-db || true
          
          echo "=== Certificates after import ==="
          security find-identity -v -p codesigning
          
          echo "=== Provisioning profiles ==="
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          find /Users/builder -name "*.mobileprovision" -type f 2>/dev/null | while read f; do
            TARGET="$HOME/Library/MobileDevice/Provisioning Profiles/$(basename "$f")"
            if [ ! -f "$TARGET" ]; then
              cp "$f" "$TARGET"
              echo "Copied: $(basename "$f")"
            fi
          done
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install Rust
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Install Rust iOS targets
        script: |
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install dependencies
        script: |
          cd "$TAURI_APP_DIR"
          npm ci || npm install

      - name: Build frontend
        script: |
          cd "$TAURI_APP_DIR"
          npm run build || echo "No build script"

      - name: Generate iOS project
        script: |
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          
          if [ ! -d src-tauri/gen/apple ]; then
            npx tauri ios init
          fi

      - name: Fix Bundle ID
        script: |
          cd "$TAURI_APP_DIR"
          PROJECT_PATH=$(find src-tauri/gen/apple -name "*.xcodeproj" | head -n 1)
          if [ -n "$PROJECT_PATH" ]; then
            sed -i '' 's/com.baiyu.ministar/app.kiwi4193.andromeda2796/g' "$PROJECT_PATH/project.pbxproj"
            echo "Bundle ID fixed"
          fi

      - name: Remove Build Rust Code script
        script: |
          cd "$TAURI_APP_DIR"
          PROJECT_PATH=$(find src-tauri/gen/apple -name "*.xcodeproj" | head -n 1)
          if [ -n "$PROJECT_PATH" ]; then
            echo "Removing Build Rust Code script from project..."
            sed -i '' '/Build Rust Code/d' "$PROJECT_PATH/project.pbxproj"
            sed -i '' '/Script-[0-9A-F]*\.sh/d' "$PROJECT_PATH/project.pbxproj"
            echo "Script removed"
          fi

      - name: Build IPA
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          
          PROJECT_PATH=$(find src-tauri/gen/apple -name "*.xcodeproj" | head -n 1)
          if [ -z "$PROJECT_PATH" ]; then
            echo "ERROR: No Xcode project found"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          cd "$PROJECT_DIR"
          
          SCHEME_NAME=$(find . -name "*.xcscheme" | head -n 1 | sed 's/.*\///' | sed 's/\.xcscheme//')
          echo "Using scheme: $SCHEME_NAME"
          
          echo "=== Certificates before build ==="
          security find-identity -v -p codesigning
          
          # 使用仓库中的 exportOptions.plist
          if [ -f "$CM_BUILD_DIR/exportOptions.plist" ]; then
            cp "$CM_BUILD_DIR/exportOptions.plist" ./
            echo "Using exportOptions.plist from repository"
          else
            echo "ERROR: exportOptions.plist not found in repository"
            exit 1
          fi
          
          xcodebuild clean -project "$(basename "$PROJECT_PATH")" -scheme "$SCHEME_NAME" || true
          
          mkdir -p "$CM_BUILD_DIR/build"
          xcodebuild archive \
            -project "$(basename "$PROJECT_PATH")" \
            -scheme "$SCHEME_NAME" \
            -archivePath "$CM_BUILD_DIR/build/ministar.xcarchive" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="Apple Distribution: Smith T (3K3Y88J6DX)" \
            CODE_SIGN_STYLE="Manual" \
            PROVISIONING_PROFILE_SPECIFIER="f708b7ef-a0b5-4dd8-a233-3b7d78519e1f" \
            DEVELOPMENT_TEAM="3K3Y88J6DX" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES
          
          if [ -d "$CM_BUILD_DIR/build/ministar.xcarchive" ]; then
            xcodebuild -exportArchive \
              -archivePath "$CM_BUILD_DIR/build/ministar.xcarchive" \
              -exportPath "$CM_BUILD_DIR/build/ipa" \
              -exportOptionsPlist exportOptions.plist \
              -allowProvisioningUpdates
            echo "Build completed"
            ls -la "$CM_BUILD_DIR/build/ipa/"
          else
            echo "Archive failed"
            exit 1
          fi

    artifacts:
      - build/ipa/*.ipa
