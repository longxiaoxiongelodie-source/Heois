workflows:
  ministar_ios_build:
    name: MiniStar iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.kiwi4193.andromeda2796
      vars:
        BUNDLE_ID: "app.kiwi4193.andromeda2796"
        TAURI_APP_DIR: "$CM_BUILD_DIR/mobile/tauri"
      xcode: latest
      node: 22.22.2

    scripts:
      - name: Install Rust
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Install Rust iOS targets
        script: |
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install dependencies
        script: |
          cd "$TAURI_APP_DIR"
          npm ci || npm install

      - name: Build frontend
        script: |
          cd "$TAURI_APP_DIR"
          npm run build || echo "No build script"

      - name: Generate iOS project
        script: |
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          
          if [ ! -d src-tauri/gen/apple ]; then
            npx tauri ios init
          fi

      - name: Fix Bundle ID
        script: |
          cd "$TAURI_APP_DIR"
          PROJECT_PATH=$(find src-tauri/gen/apple -name "*.xcodeproj" | head -n 1)
          if [ -n "$PROJECT_PATH" ]; then
            sed -i '' 's/com.baiyu.ministar/app.kiwi4193.andromeda2796/g' "$PROJECT_PATH/project.pbxproj"
          fi

      - name: Apply provisioning profiles
        script: |
          cd "$TAURI_APP_DIR"
          PROJECT_PATH=$(find src-tauri/gen/apple -name "*.xcodeproj" | head -n 1)
          if [ -n "$PROJECT_PATH" ]; then
            keychain initialize
            xcode-project use-profiles --project "$PROJECT_PATH"
          fi

      - name: Build IPA with manual signing
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          
          PROJECT_PATH=$(find src-tauri/gen/apple -name "*.xcodeproj" | head -n 1)
          if [ -z "$PROJECT_PATH" ]; then
            echo "ERROR: No Xcode project found"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          cd "$PROJECT_DIR"
          
          SCHEME_NAME=$(find . -name "*.xcscheme" | head -n 1 | sed 's/.*\///' | sed 's/\.xcscheme//')
          echo "Using scheme: $SCHEME_NAME"
          
          # 查看可用的证书
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning
          
          # 查看可用的描述文件
          echo "=== Available provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles"
          
          # 清理
          xcodebuild clean -project "$(basename "$PROJECT_PATH")" -scheme "$SCHEME_NAME" || true
          
          # 创建 archive
          mkdir -p "$CM_BUILD_DIR/build"
          xcodebuild archive \
            -project "$(basename "$PROJECT_PATH")" \
            -scheme "$SCHEME_NAME" \
            -archivePath "$CM_BUILD_DIR/build/ministar.xcarchive" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            CODE_SIGN_STYLE="Manual" \
            PROVISIONING_PROFILE_SPECIFIER="f708b7ef-a0b5-4dd8-a233-3b7d78519e1f" \
            DEVELOPMENT_TEAM="3K3Y88J6DX" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES 2>&1 | tee build.log
          
          # 检查构建是否成功
          if [ ! -d "$CM_BUILD_DIR/build/ministar.xcarchive" ]; then
            echo "Archive failed, showing last 100 lines of build log:"
            tail -100 build.log
            exit 1
          fi
          
          # 导出 IPA
          cp "$CM_BUILD_DIR/exportOptions.plist" ./
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ministar.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ipa" \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates
          
          echo "Build completed"
          ls -la "$CM_BUILD_DIR/build/ipa/"

    artifacts:
      - build/ipa/*.ipa
