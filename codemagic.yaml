workflows:
  ministar_ios_build:
    name: MiniStar iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.kiwi4193.andromeda2796
      vars:
        BUNDLE_ID: "app.kiwi4193.andromeda2796"
        TAURI_APP_DIR: "$CM_BUILD_DIR/mobile/tauri"
      xcode: latest
      node: 22.22.2

    scripts:
      - name: Install Rust
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install dependencies
        script: |
          cd "$TAURI_APP_DIR"
          npm ci || npm install

      - name: Build frontend
        script: |
          cd "$TAURI_APP_DIR"
          npm run build || echo "No build script"

      - name: Generate iOS project
        script: |
          cd "$TAURI_APP_DIR"
          if [ ! -d src-tauri/gen/apple ]; then
            npx tauri ios init
          fi

      - name: Fix Bundle ID
        script: |
          cd "$TAURI_APP_DIR"
          PROJECT_PATH=$(find src-tauri/gen/apple -name "*.xcodeproj" | head -n 1)
          if [ -n "$PROJECT_PATH" ]; then
            sed -i '' 's/com.baiyu.ministar/app.kiwi4193.andromeda2796/g' "$PROJECT_PATH/project.pbxproj"
          fi

      - name: Build IPA with Codemagic signing
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          
          PROJECT_PATH=$(find src-tauri/gen/apple -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          cd "$PROJECT_DIR"
          
          SCHEME_NAME=$(find . -name "*.xcscheme" | head -n 1 | sed 's/.*\///' | sed 's/\.xcscheme//')
          
          # 让 Codemagic 自动处理签名
          xcode-project build-ipa \
            --project "$(basename "$PROJECT_PATH")" \
            --scheme "$SCHEME_NAME"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.ipa
