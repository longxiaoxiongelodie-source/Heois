workflows:
  ministar_ios_build:
    name: MiniStar iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.kiwi4193.andromeda2796
      vars:
        APP_NAME: "MiniStar"
        BUNDLE_ID: "app.kiwi4193.andromeda2796"
        DEVELOPMENT_TEAM: "3K3Y88J6DX"
        CERT_PASSWORD: "1"
        TAURI_APP_DIR: "$CM_BUILD_DIR/mobile/tauri"
        TAURI_SRC_DIR: "$CM_BUILD_DIR/mobile/tauri/src-tauri"
      xcode: latest
      node: 22.22.2

    cache:
      cache_paths:
        - $HOME/.cargo/registry
        - $HOME/.cargo/git
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/mobile/tauri/node_modules

    scripts:
      - name: Show build context
        script: |
          set -euxo pipefail
          uname -a
          sw_vers
          xcodebuild -version
          rustc --version || true
          cargo --version || true
          node --version
          npm --version

      - name: Check project files
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR"
          find . -maxdepth 4 -type f \( -name "package.json" -o -name "tauri.conf.json" -o -name "mobile.html" \) | sort
          test -f "$TAURI_APP_DIR/package.json"
          test -f "$TAURI_SRC_DIR/tauri.conf.json"
          test -f "$TAURI_APP_DIR/web/mobile.html"

      - name: Inspect signing assets
        script: |
          set -euxo pipefail
          echo "=== Certificates ==="
          security find-identity -v -p codesigning || true
          echo "=== Provisioning Profiles ==="
          find "$HOME/Library/MobileDevice/Provisioning Profiles" -maxdepth 1 -name "*.mobileprovision" -print || true

      - name: Install Rust and iOS targets
        script: |
          set -euxo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install frontend dependencies
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          npm install

      - name: Patch tauri identifier
        script: |
          set -euxo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          tauri_src = os.environ['TAURI_SRC_DIR']
          bundle_id = os.environ['BUNDLE_ID']
          path = Path(tauri_src) / 'tauri.conf.json'
          data = json.loads(path.read_text(encoding='utf-8'))
          data['identifier'] = bundle_id
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print('patched', path)
          PY

      - name: Generate Tauri iOS project
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          rm -rf src-tauri/gen/apple
          npx tauri ios init
          find src-tauri/gen/apple -maxdepth 2 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) -print

      - name: Inject alternate app icons
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          export ALT_ICON_SRC_DIR="$TAURI_SRC_DIR/icons/ios-alternate"
          export IOS_APP_DIR="$(find "$TAURI_SRC_DIR/gen/apple" -maxdepth 2 -type d -name '*_iOS' | head -n 1)"
          export IOS_INFO_PLIST="$IOS_APP_DIR/Info.plist"
          export IOS_XCODEPROJ="$(find "$TAURI_SRC_DIR/gen/apple" -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          python3 - <<'PY'
          import os
          import plistlib
          import shutil
          from pathlib import Path

          alt_src = Path(os.environ['ALT_ICON_SRC_DIR'])
          ios_app_dir = Path(os.environ['IOS_APP_DIR'])
          info_plist = Path(os.environ['IOS_INFO_PLIST'])

          icon_map = {
              'Seal': {
                  'folder': 'seal',
                  'iphone': {
                      'ministar-seal@2x.png': 'ministar-seal-120.png',
                      'ministar-seal@3x.png': 'ministar-seal-180.png',
                  },
                  'ipad': {
                      'ministar-seal-ipad@2x.png': 'ministar-seal-152.png',
                      'ministar-seal-ipad-pro@2x.png': 'ministar-seal-167.png',
                  },
              },
              'Orbit': {
                  'folder': 'orbit',
                  'iphone': {
                      'ministar-orbit@2x.png': 'ministar-orbit-120.png',
                      'ministar-orbit@3x.png': 'ministar-orbit-180.png',
                  },
                  'ipad': {
                      'ministar-orbit-ipad@2x.png': 'ministar-orbit-152.png',
                      'ministar-orbit-ipad-pro@2x.png': 'ministar-orbit-167.png',
                  },
              },
              'Spark': {
                  'folder': 'spark',
                  'iphone': {
                      'ministar-spark@2x.png': 'ministar-spark-120.png',
                      'ministar-spark@3x.png': 'ministar-spark-180.png',
                  },
                  'ipad': {
                      'ministar-spark-ipad@2x.png': 'ministar-spark-152.png',
                      'ministar-spark-ipad-pro@2x.png': 'ministar-spark-167.png',
                  },
              },
          }

          for icon_name, spec in icon_map.items():
              folder = alt_src / spec['folder']
              for files in (spec['iphone'], spec['ipad']):
                  for target_name, source_name in files.items():
                      source = folder / source_name
                      target = ios_app_dir / target_name
                      shutil.copy2(source, target)

          with info_plist.open('rb') as fp:
              plist = plistlib.load(fp)

          iphone_alternate_icons = {
              icon_name: {
                  "CFBundleIconFiles": [f"ministar-{spec['folder']}"],
                  "UIPrerenderedIcon": False,
              }
              for icon_name, spec in icon_map.items()
          }
          ipad_alternate_icons = {
              icon_name: {
                  "CFBundleIconFiles": [
                      f"ministar-{spec['folder']}",
                      f"ministar-{spec['folder']}-ipad",
                      f"ministar-{spec['folder']}-ipad-pro",
                  ],
                  "UIPrerenderedIcon": False,
              }
              for icon_name, spec in icon_map.items()
          }

          plist.setdefault("CFBundleIcons", {})["CFBundleAlternateIcons"] = iphone_alternate_icons
          plist.setdefault("CFBundleIcons~ipad", {})["CFBundleAlternateIcons"] = ipad_alternate_icons

          with info_plist.open('wb') as fp:
              plistlib.dump(plist, fp)

          print("Injected alternate icons into", ios_app_dir)
          print("Patched", info_plist)
          PY
          ruby - <<'RUBY'
          require 'xcodeproj'
          require 'pathname'

          project_path = ENV.fetch('IOS_XCODEPROJ')
          ios_app_dir = Pathname.new(ENV.fetch('IOS_APP_DIR'))
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name.end_with?('_iOS') } || project.targets.first
          resources = target.resources_build_phase
          project_dir = Pathname.new(File.dirname(project_path))
          group = project.main_group.find_subpath('AlternateIcons', true)

          icon_files = %w[
            ministar-seal@2x.png
            ministar-seal@3x.png
            ministar-seal-ipad@2x.png
            ministar-seal-ipad-pro@2x.png
            ministar-orbit@2x.png
            ministar-orbit@3x.png
            ministar-orbit-ipad@2x.png
            ministar-orbit-ipad-pro@2x.png
            ministar-spark@2x.png
            ministar-spark@3x.png
            ministar-spark-ipad@2x.png
            ministar-spark-ipad-pro@2x.png
          ]

          icon_files.each do |name|
            absolute = ios_app_dir.join(name)
            relative = absolute.relative_path_from(project_dir).to_s
            ref = group.files.find { |f| f.path == relative } || group.new_file(relative)
            unless resources.files_references.any? { |f| f.path == ref.path }
              resources.add_file_reference(ref, true)
            end
          end

          project.save
          puts "Added alternate icons to Xcode resources: #{project_path}"
          RUBY

      - name: Locate manual signing assets
        script: |
          set -euxo pipefail
          CERT_FILE="$(find /Users/builder -name '*.p12' -type f 2>/dev/null | head -n 1)"
          PROFILE_FILE="$(find /Users/builder -name '*.mobileprovision' -type f 2>/dev/null | head -n 1)"
          if [ -z "$CERT_FILE" ]; then
            echo "No .p12 certificate found"
            exit 1
          fi
          if [ -z "$PROFILE_FILE" ]; then
            echo "No .mobileprovision profile found"
            exit 1
          fi
          printf 'CERT_FILE=%s\n' "$CERT_FILE" >> "$CM_ENV"
          printf 'PROFILE_FILE=%s\n' "$PROFILE_FILE" >> "$CM_ENV"
          echo "Using certificate: $CERT_FILE"
          echo "Using profile: $PROFILE_FILE"

      - name: Apply provisioning profile to generated project
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          PROJECT_PATH="$(find src-tauri/gen/apple -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          if [ -z "$PROJECT_PATH" ]; then
            echo "No Xcode project found under src-tauri/gen/apple"
            exit 1
          fi
          xcode-project use-profiles \
            --project "$PROJECT_PATH" \
            --profile "$PROFILE_FILE" \
            --archive-method ad-hoc \
            --custom-export-options='{"provisioningProfiles":{"app.kiwi4193.andromeda2796":"app.kiwi4193.andromeda2796"}}' \
            --export-options-plist "$CM_BUILD_DIR/exportOptions.plist"

      - name: Build signed IPA
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          export DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM"
          export APPLE_DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM"
          export RUST_BACKTRACE=1
          export IOS_CERTIFICATE="$(base64 -i "$CERT_FILE" | tr -d '\n')"
          export IOS_CERTIFICATE_PASSWORD="$CERT_PASSWORD"
          export IOS_MOBILE_PROVISION="$(base64 -i "$PROFILE_FILE" | tr -d '\n')"
          npx tauri ios build --export-method release-testing

      - name: List generated artifacts
        script: |
          set -euxo pipefail
          find "$TAURI_SRC_DIR/gen/apple/build" -maxdepth 5 \( -name "*.ipa" -o -name "*.app" -o -name "*.dSYM" -o -name "*.dSYM.zip" \) -print || true

    artifacts:
      - mobile/tauri/src-tauri/gen/apple/build/**/*.ipa
      - mobile/tauri/src-tauri/gen/apple/build/**/*.app
      - mobile/tauri/src-tauri/gen/apple/build/**/*.dSYM
      - mobile/tauri/src-tauri/gen/apple/build/**/*.dSYM.zip
