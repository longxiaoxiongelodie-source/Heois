workflows:
  ministar_ios_build:
    name: MiniStar iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.kiwi4193.andromeda2796
      vars:
        APP_NAME: "MiniStar"
        BUNDLE_ID: "app.kiwi4193.andromeda2796"
        TAURI_APP_DIR: "$CM_BUILD_DIR/mobile/tauri"
        TAURI_SRC_DIR: "$CM_BUILD_DIR/mobile/tauri/src-tauri"
        APPLE_DEVELOPMENT_TEAM: "3K3Y88J6DX"
        PROVISIONING_PROFILE_UUID: "f708b7ef-a0b5-4dd8-a233-3b7d78519e1f"
      xcode: latest
      node: 22.22.2

    cache:
      cache_paths:
        - $HOME/.cargo/registry
        - $HOME/.cargo/git
        - $HOME/.rustup
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/mobile/tauri/node_modules

    scripts:
      - name: Show build context
        script: |
          set -euxo pipefail
          uname -a
          sw_vers
          xcodebuild -version
          node --version
          npm --version
          echo "Checking directory structure..."
          ls -la "$CM_BUILD_DIR/mobile/tauri" || echo "Directory not found"

      - name: Install Rust
        script: |
          set -euxo pipefail
          if ! command -v rustc &> /dev/null; then
            echo "Rust not found, installing..."
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          else
            echo "Rust already installed"
          fi
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version
          rustup --version

      - name: Install Rust iOS targets
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install frontend dependencies
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la
          
          if [ ! -f "package.json" ]; then
            echo "ERROR: package.json not found in $(pwd)"
            exit 1
          fi
          
          if [ -f "package-lock.json" ]; then
            echo "Found package-lock.json, using npm ci"
            npm ci
          else
            echo "No package-lock.json found, using npm install"
            npm install
          fi

      - name: Build frontend
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          echo "Building frontend..."
          if [ -f "package.json" ]; then
            npm run build || echo "No build script found, skipping frontend build"
          fi
          echo "Current directory contents:"
          ls -la

      - name: Generate Tauri iOS project
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          
          if [ ! -d src-tauri/gen/apple ]; then
            echo "Initializing Tauri iOS project..."
            npx tauri ios init
          else
            echo "Tauri iOS project already exists"
          fi
          
          echo "Found Xcode projects:"
          find src-tauri/gen/apple -maxdepth 2 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) -print

      - name: Fix Bundle ID in Xcode project
        script: |
          set -euxo pipefail
          cd "$TAURI_APP_DIR"
          
          PROJECT_PATH="$(find src-tauri/gen/apple -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          if [ -z "$PROJECT_PATH" ]; then
            echo "ERROR: No Xcode project found"
            exit 1
          fi
          
          echo "Fixing Bundle ID in $PROJECT_PATH"
          
          # 修改 project.pbxproj 中的 Bundle ID
          sed -i '' "s/com.baiyu.ministar/app.kiwi4193.andromeda2796/g" "$PROJECT_PATH/project.pbxproj"
          
          # 修改 Info.plist 中的 Bundle ID
          find src-tauri/gen/apple -name "Info.plist" -exec plutil -replace CFBundleIdentifier -string "app.kiwi4193.andromeda2796" {} \; 2>/dev/null || true
          
          echo "Bundle ID fixed"
          grep -r "app.kiwi4193.andromeda2796" "$PROJECT_PATH" | head -5

      - name: Import signing certificate
        script: |
          set -euxo pipefail
          
          # 查找上传的证书文件
          echo "Looking for certificate files..."
          CERT_FILE=$(find "$CM_BUILD_DIR" -name "*.p12" -type f 2>/dev/null | head -n 1)
          
          if [ -z "$CERT_FILE" ]; then
            echo "ERROR: No .p12 certificate file found"
            echo "Searching in: $CM_BUILD_DIR"
            find "$CM_BUILD_DIR" -name "*.p12" -type f 2>/dev/null || echo "No .p12 files found"
            exit 1
          fi
          
          echo "Found certificate: $CERT_FILE"
          
          # 导入证书到钥匙串（密码为空，如果有密码需要提供）
          security import "$CERT_FILE" -k ~/Library/Keychains/login.keychain-db -P "" -T /usr/bin/codesign -T /usr/bin/xcodebuild || {
            echo "Import with empty password failed, trying without password option..."
            security import "$CERT_FILE" -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign -T /usr/bin/xcodebuild
          }
          
          # 设置钥匙串允许 codesign 访问
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" ~/Library/Keychains/login.keychain-db || true
          
          # 验证证书是否导入成功
          echo "Verifying certificates in keychain..."
          security find-identity -v -p codesigning

      - name: Apply provisioning profiles
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          
          PROJECT_PATH="$(find src-tauri/gen/apple -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          if [ -z "$PROJECT_PATH" ]; then
            echo "ERROR: No Xcode project found under src-tauri/gen/apple"
            exit 1
          fi
          
          echo "Using project: $PROJECT_PATH"
          
          # 确保描述文件目录存在
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          
          # 列出已安装的描述文件
          echo "Installed provisioning profiles:"
          ls -la "$PROFILES_DIR/" || echo "No profiles found"
          
          # 初始化 keychain
          keychain initialize
          
          # 使用 xcode-project 应用描述文件
          xcode-project use-profiles --project "$PROJECT_PATH"

      - name: Build signed IPA
        script: |
          set -euxo pipefail
          source "$HOME/.cargo/env"
          cd "$TAURI_APP_DIR"
          
          PROJECT_PATH="$(find src-tauri/gen/apple -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          if [ -z "$PROJECT_PATH" ]; then
            echo "ERROR: No Xcode project found"
            exit 1
          fi
          
          PROJECT_DIR="$(dirname "$PROJECT_PATH")"
          echo "Project directory: $PROJECT_DIR"
          
          cd "$PROJECT_DIR"
          
          SCHEME_NAME=$(find . -name "*.xcscheme" -exec basename {} .xcscheme \; | head -n 1)
          if [ -z "$SCHEME_NAME" ]; then
            SCHEME_NAME="app"
          fi
          echo "Using scheme: $SCHEME_NAME"
          
          # 复制 exportOptions.plist 到当前目录
          cp "$CM_BUILD_DIR/exportOptions.plist" ./
          
          # 清理
          xcodebuild clean -project "$(basename "$PROJECT_PATH")" -scheme "$SCHEME_NAME" || true
          
          # 再次验证证书
          echo "Verifying certificates before build..."
          security find-identity -v -p codesigning
          
          # 构建 archive
          mkdir -p "$CM_BUILD_DIR/build"
          xcodebuild archive \
            -project "$(basename "$PROJECT_PATH")" \
            -scheme "$SCHEME_NAME" \
            -archivePath "$CM_BUILD_DIR/build/ministar.xcarchive" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            CODE_SIGN_STYLE="Manual" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID" \
            DEVELOPMENT_TEAM="$APPLE_DEVELOPMENT_TEAM" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES
          
          # 导出 IPA
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ministar.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ipa" \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates
          
          echo "Build completed"
          ls -la "$CM_BUILD_DIR/build/ipa/"

      - name: List generated artifacts
        script: |
          set -euxo pipefail
          echo "Searching for generated artifacts..."
          find "$CM_BUILD_DIR/build" -name "*.ipa" -print || true

    artifacts:
      - build/ipa/*.ipa
